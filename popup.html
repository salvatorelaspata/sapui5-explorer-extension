<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <img src="icons/icon48.png" class="header-logo" alt="logo">
    <span class="header-title">SAPUI5 Explorer</span>
    <span class="header-version" id="ui5Version" hidden></span>
  </div>

  <!-- Analyze Bar -->
  <div class="analyze-bar">
    <button id="analyzeBtn">ANALYZE</button>
  </div>

  <!-- Error Banner (hidden by default) -->
  <div class="error-banner" id="errorBanner">
    <span>&#9888;</span>
    <span id="errorBannerText"></span>
  </div>
  <div class="error-banner-details" id="errorBannerDetails"></div>

  <!-- Tab Bar -->
  <nav class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="components">Components <span class="badge" id="badgeComponents" hidden></span></button>
    <button class="tab-btn" data-tab="odata">OData <span class="badge" id="badgeOData" hidden></span></button>
    <button class="tab-btn" data-tab="bindings">Bindings <span class="badge" id="badgeBindings" hidden></span></button>
    <button class="tab-btn" data-tab="logs">Logs <span class="badge" id="badgeLogs" hidden></span></button>
    <button class="tab-btn" data-tab="runtime">Runtime</button>
    <button class="tab-btn" data-tab="json">JSON</button>
  </nav>

  <!-- Tab Content -->
  <div id="tabContent">
    <section class="tab-panel active" id="tab-overview">
      <div class="placeholder">
        <div class="placeholder-icon">&#128269;</div>
        <div class="placeholder-text">Click <strong>ANALYZE</strong> to inspect the SAPUI5 app</div>
      </div>
    </section>
    <section class="tab-panel" id="tab-components"></section>
    <section class="tab-panel" id="tab-odata"></section>
    <section class="tab-panel" id="tab-bindings"></section>
    <section class="tab-panel" id="tab-logs"></section>
    <section class="tab-panel" id="tab-runtime"></section>
    <section class="tab-panel" id="tab-json">
      <div class="json-container">
        <pre class="json-output" id="jsonOutput">No data yet.</pre>
        <button id="copyBtn">COPY JSON</button>
      </div>
    </section>
  </div>

  <script src="content.js"></script>
  <script src="popup.js"></script>
</body>
</html>
