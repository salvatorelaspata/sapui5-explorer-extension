<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Segoe UI', sans-serif; width: 380px; margin: 0; padding: 15px; background: #f4f7f9; }
    h2 { color: #0070f2; margin: 0 0 15px 0; font-size: 1.1rem; border-bottom: 2px solid #0070f2; padding-bottom: 5px; }
    button { 
      width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s;
    }
    #analyzeBtn { background-color: #0070f2; color: white; margin-bottom: 10px; }
    #analyzeBtn:hover { background-color: #005cc2; }
    #copyBtn { background-color: #e0e0e0; color: #333; display: none; margin-top: 10px; }
    #copyBtn:hover { background-color: #d0d0d0; }
    .card { background: white; border: 1px solid #ced4da; padding: 12px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    pre { font-size: 12px; white-space: pre-wrap; word-wrap: break-word; margin: 0; color: #333; max-height: 400px; overflow-y: auto; }
    .debug-on { color: #d32f2f; font-weight: bold; }
  </style>
</head>
<body>
  <h2>SAPUI5 Quick Analyzer</h2>
  <button id="analyzeBtn">ANALIZZA APP</button>
  
  <div class="card">
    <pre id="result">In attesa di analisi...</pre>
  </div>

  <button id="copyBtn">COPIA JSON</button>

  <script src="popup.js"></script>
</body>
</html>
